services:
  - type: web
    name: nutriplan
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: USDA_API_KEY
        sync: false
