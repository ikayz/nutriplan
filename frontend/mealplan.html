<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View and configure your weekly meal plan, watch aggregate calorie summaries, and customize your diet grid.">
  <title>NutriPlan - Weekly Meal Planner</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="nav-container">
      <a href="index.html" class="logo-link">
        <span class="logo-icon">🥗</span>
        <div class="logo-text">Nutri<span>Plan</span></div>
      </a>
      <nav>
        <ul class="nav-menu" id="nav-menu">
          <!-- Loaded dynamically -->
        </ul>
      </nav>
      <div class="nav-actions" id="header-actions">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="page-title-section">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h2 class="page-title">Weekly Meal Planner</h2>
          <p class="page-subtitle">Schedule your meals, organize your eating routine, and track daily macro summaries.</p>
        </div>
        <div>
          <button id="btn-clear-week" class="btn btn-danger btn-sm">Clear Current Week</button>
        </div>
      </div>
    </section>

    <!-- Controls for date shifting -->
    <section class="meal-controls glass-panel" style="padding: 1.2rem; border-radius: 12px;">
      <div class="week-navigation">
        <button id="btn-prev-week" class="btn btn-secondary btn-sm">&larr; Previous Week</button>
        <div class="current-week-label" id="current-week-label">Week of June 8, 2026</div>
        <button id="btn-next-week" class="btn btn-secondary btn-sm">Next Week &rarr;</button>
      </div>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Your Target Daily Calories:</span>
        <span id="calorie-target-display" class="diet-badge" style="font-size: 0.85rem;">2000 kcal</span>
      </div>
    </section>

    <!-- Weekly planner items -->
    <section class="mealplan-weekly-grid" id="mealplan-weekly-grid">
      <!-- Generated dynamically by app.js (7 day panels) -->
      <div class="skeleton-card" style="height: 200px;"></div>
      <div class="skeleton-card" style="height: 200px;"></div>
    </section>
  </main>

  <!-- Custom Add Meal Modal -->
  <div id="add-custom-meal-modal" class="modal-overlay">
    <div class="modal-container glass-panel">
      <div class="modal-header">
        <h3 class="modal-title">Add Custom Meal</h3>
        <button class="btn-modal-close" id="btn-close-custom-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="custom-meal-form">
          <input type="hidden" id="custom-meal-date">
          <input type="hidden" id="custom-meal-slot">
          
          <div class="form-group">
            <label class="form-label" for="custom-meal-name">Meal Item Name</label>
            <input type="text" id="custom-meal-name" class="form-input" placeholder="e.g. Scrambled Eggs with Spinach" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="custom-meal-calories">Calories (kcal)</label>
            <input type="number" id="custom-meal-calories" class="form-input" placeholder="e.g. 240" min="0" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
            Add to Meal Plan
          </button>
        </form>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="footer-content">
      <p>&copy; 2026 NutriPlan. Built with Express, MongoDB, and Vanilla JS.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
