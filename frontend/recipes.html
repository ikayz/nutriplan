<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search Spoonacular recipes, view details, and save items to your meal plans.">
  <title>NutriPlan - Search Recipes</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="nav-container">
      <a href="index.html" class="logo-link">
        <span class="logo-icon">🥗</span>
        <div class="logo-text">Nutri<span>Plan</span></div>
      </a>
      <nav>
        <ul class="nav-menu" id="nav-menu">
          <!-- Populated dynamically -->
        </ul>
      </nav>
      <div class="nav-actions" id="header-actions">
        <!-- Populated dynamically -->
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="page-title-section">
      <h2 class="page-title">Explore Recipes</h2>
      <p class="page-subtitle">Find nutrient-dense meals and add them to your weekly agenda.</p>
    </section>

    <!-- Search / Filter Bar -->
    <section class="search-bar-container">
      <form id="search-form" class="search-form">
        <div class="search-input-wrapper">
          <input type="text" id="query-input" class="search-input" placeholder="Search for recipes (e.g. Salmon, Chicken, Salad)..." required>
        </div>
        
        <select id="diet-select" class="filter-select">
          <option value="">Any Diet</option>
          <option value="Vegetarian">Vegetarian</option>
          <option value="Vegan">Vegan</option>
          <option value="Gluten Free">Gluten Free</option>
          <option value="Ketogenic">Ketogenic</option>
          <option value="Paleo">Paleo</option>
        </select>
        
        <select id="calories-select" class="filter-select">
          <option value="">Any Calories</option>
          <option value="300">Under 300 kcal</option>
          <option value="500">Under 500 kcal</option>
          <option value="800">Under 800 kcal</option>
        </select>

        <button type="submit" class="btn btn-primary">Search</button>
      </form>
    </section>

    <!-- Recipes Grid -->
    <section class="recipes-grid" id="recipes-grid">
      <!-- Cards rendered via JS -->
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </section>
  </main>

  <!-- Recipe Details Modal -->
  <div id="recipe-details-modal" class="modal-overlay">
    <div class="modal-container glass-panel recipe-modal-width">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-recipe-title">Recipe Details</h3>
        <button class="btn-modal-close" id="btn-close-details">&times;</button>
      </div>
      <div class="modal-body" id="modal-recipe-body">
        <!-- Loaded via JS -->
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="footer-content">
      <p>&copy; 2026 NutriPlan. Built with Express, MongoDB, and Vanilla JS.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
